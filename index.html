<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
*{box-sizing:border-box;margin:0;padding:0}

html,body{
  width:100%;height:100vh;
  background:#F5F5F5;
  overflow:hidden;
  font-family:'Pretendard',sans-serif;
  cursor:none;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ── Main animation canvas — full screen ── */
#c{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  z-index:1;
}

/* ── Centered static artwork image ──
   Replaces the old looping chroma-keyed video + per-frame
   canvas processing with a single pre-keyed PNG (transparent
   background already baked in). Massively lighter: no decode,
   no per-pixel getImageData/putImageData every frame.          */
#center-video-img{
  position:absolute;
  display:block;
  pointer-events:none;
  opacity:0;
  z-index:2;
  width:100%;height:100%;
  -webkit-transform:translateZ(0);
  transform:translateZ(0);
  will-change:opacity;
  isolation:isolate;
  -webkit-transition:opacity 1.4s ease;
  transition:opacity 1.4s ease;
}

/* ── UI overlay — topmost ── */
#ui{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:10;
}

.hud{
  position:absolute;left:22px;top:22px;
  font-size:9px;line-height:1.8;
  color:rgba(6,13,13,0.45);
  white-space:pre;letter-spacing:0.07em;
  font-weight:300;opacity:0;
  -webkit-transition:opacity 1s;
  transition:opacity 1s;
}
.hud-bot{top:auto;bottom:22px;}

#nav{
  position:absolute;top:22px;right:22px;
  display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  gap:8px;
  -webkit-align-items:flex-end;align-items:flex-end;
  pointer-events:all;
}
#nav a{
  font-size:9px;letter-spacing:0.2em;
  text-transform:uppercase;
  color:rgba(6,13,13,0.4);
  text-decoration:none;cursor:none;
  -webkit-transition:color 0.3s;transition:color 0.3s;
  font-weight:300;opacity:0;
}
#nav a:hover{color:rgba(6,13,13,0.9);}

#title-wrap{
  position:absolute;bottom:28px;right:24px;
  text-align:right;pointer-events:none;
}
#scramble-title{
  font-size:54px;font-weight:700;
  letter-spacing:-0.04em;
  color:#060D0D;line-height:1;opacity:0;
}
#title-sub{
  font-size:9px;letter-spacing:0.22em;
  text-transform:uppercase;
  color:rgba(6,13,13,0.4);
  margin-top:7px;font-weight:300;opacity:0;
}

#cursor{
  position:fixed;pointer-events:none;z-index:999;
  width:7px;height:7px;border-radius:50%;
  background:#060D0D;
  -webkit-transform:translate(-50%,-50%);
  transform:translate(-50%,-50%);
  -webkit-transition:width 0.2s,height 0.2s;
  transition:width 0.2s,height 0.2s;
}
#cursor-ring{
  position:fixed;pointer-events:none;z-index:998;
  width:28px;height:28px;border-radius:50%;
  border:0.75px solid rgba(6,13,13,0.3);
  -webkit-transform:translate(-50%,-50%);
  transform:translate(-50%,-50%);
}

#info{
  position:absolute;
  background:rgba(245,245,245,0.95);
  border:0.5px solid rgba(6,13,13,0.18);
  padding:10px 14px;
  font-size:9px;line-height:2;
  color:#060D0D;pointer-events:none;
  max-width:175px;display:none;
  white-space:pre;font-weight:300;
  letter-spacing:0.04em;
  z-index:20;
}

#scan{
  position:absolute;top:0;left:0;right:0;
  height:1px;background:rgba(6,13,13,0.04);
  -webkit-animation:scanMove 6s linear infinite;
  animation:scanMove 6s linear infinite;
  pointer-events:none;z-index:5;
}
@-webkit-keyframes scanMove{0%{top:-1px;}100%{top:100%;}}
@keyframes scanMove{0%{top:-1px;}100%{top:100%;}}

#phase-label{
  position:absolute;bottom:80px;left:50%;
  -webkit-transform:translateX(-50%);
  transform:translateX(-50%);
  font-size:8px;letter-spacing:0.25em;
  text-transform:uppercase;
  color:rgba(6,13,13,0.25);
  font-weight:300;opacity:0;
  -webkit-transition:opacity 0.5s;
  transition:opacity 0.5s;
}
</style>
</head>

<script>
/* ═══════════════════════════════════════
   CANVAS SETUP
═══════════════════════════════════════ */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const CW = () => canvas.offsetWidth;
const CH = () => canvas.offsetHeight;

let mx = window.innerWidth / 2;
let my = window.innerHeight / 2;
let frame = 0;
let hoveredNode = null;

const PHASE_DUR = [0, 0, 140, Infinity];
let phase = 2, phaseT = 0;

const NODE_META = [
  {id:1, title:'Threshold Studies',   year:'2024', type:'Video Installation', icon:'triquetra',          angle:0.4},
  {id:2, title:'Residual Memory',      year:'2023', type:'Interactive',         icon:'hexagonFormation',   angle:2.0},
  {id:3, title:'Frequency Mapping',   year:'2023', type:'Generative A/V',      icon:'spiralingTriangles', angle:3.6},
  {id:4, title:'Noise Portraits',     year:'2022', type:'Single-ch Video',     icon:'eyeOfGod',           angle:5.3},
];

let iconNodes = [];
let hermeticT = 0;

/* ═══════════════════════════════════════
   SCENE INIT
═══════════════════════════════════════ */
function initScene() {
  const cw = CW(), ch = CH();
  const cx = cw / 2, cy = ch / 2;
  const dist = Math.min(cw, ch) * 0.41;

  iconNodes = NODE_META.map(m => ({
    ...m, cx, cy,
    x: cx + Math.cos(m.angle) * dist,
    y: cy + Math.sin(m.angle) * dist,
    dist, ang: m.angle, r: 26
  }));

  /* Size and position the static artwork image, centered on stage.
     Scaled down to ~20% of viewport (previously 26%) per request;
     16:9 box matches the source PNG canvas's native aspect ratio. */
  const vW = Math.min(cw * 0.20, ch * 0.20 * (16/9));
  const vH = vW * (9/16);
  const vi = document.getElementById('center-video-img');
  vi.style.width  = vW + 'px';
  vi.style.height = vH + 'px';
  vi.style.left   = (cx - vW / 2) + 'px';
  vi.style.top    = (cy - vH / 2) + 'px';
}

/* ═══════════════════════════════════════
   DRAWING HELPERS
═══════════════════════════════════════ */
function drawConcreteBlock(x, y, w, h, rot, grey, alpha) {
  ctx.save();
  ctx.translate(x + w/2, y + h/2);
  ctx.rotate(rot);
  const g = Math.floor(grey * 255);
  ctx.fillStyle = `rgba(${g},${g},${g},${alpha})`;
  ctx.fillRect(-w/2, -h/2, w, h);
  const lt = Math.floor(Math.min(255, g * 1.18)), eh = h * 0.22, ew = w * 0.14;
  ctx.fillStyle = `rgba(${lt},${lt},${lt},${alpha * 0.7})`;
  ctx.beginPath();
  ctx.moveTo(-w/2,-h/2); ctx.lineTo(-w/2+ew,-h/2-eh);
  ctx.lineTo(w/2+ew,-h/2-eh); ctx.lineTo(w/2,-h/2);
  ctx.closePath(); ctx.fill();
  const dk = Math.floor(g * 0.68);
  ctx.fillStyle = `rgba(${dk},${dk},${dk},${alpha * 0.7})`;
  ctx.beginPath();
  ctx.moveTo(w/2,-h/2); ctx.lineTo(w/2+ew,-h/2-eh);
  ctx.lineTo(w/2+ew,h/2-eh); ctx.lineTo(w/2,h/2);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = `rgba(6,13,13,${alpha*0.22})`;
  ctx.lineWidth = 0.35; ctx.strokeRect(-w/2,-h/2,w,h);
  ctx.beginPath();
  ctx.moveTo(-w/2,-h/2); ctx.lineTo(-w/2+ew,-h/2-eh);
  ctx.moveTo(w/2,-h/2);  ctx.lineTo(w/2+ew,-h/2-eh);
  ctx.moveTo(-w/2+ew,-h/2-eh); ctx.lineTo(w/2+ew,-h/2-eh);
  ctx.moveTo(w/2+ew,-h/2-eh);  ctx.lineTo(w/2+ew,h/2-eh);
  ctx.stroke();
  ctx.restore();
}

function drawHermeticLines() {
  const cw = CW(), ch = CH(), cx = cw/2, cy = ch/2;
  const bR = Math.min(cw, ch) * 0.19;
  const fi = Math.min(1, phaseT / 80);
  hermeticT += 0.007;
  const t = hermeticT;

  [[1,0,1.0,0.48],[2,1.2,0.72,0.34],[3,2.4,0.56,0.26],
   [1.5,0.8,0.88,0.38],[2.5,3.1,0.66,0.28],[4,1.7,0.46,0.22]]
  .forEach(([freq,ph,rm,lw]) => {
    const pts = [];
    for (let i = 0; i <= 100; i++) {
      const a = (i/100) * Math.PI * 2;
      const n1 = Math.sin(a*freq+t+ph)*0.16;
      const n2 = Math.cos(a*freq*1.3+t*0.7+ph)*0.1;
      const n3 = Math.sin(a*freq*0.5+t*1.4)*0.07;
      const cpx = (mx-cx) / Math.min(cw,ch) * 0.035;
      const cpy = (my-cy) / Math.min(cw,ch) * 0.035;
      const r = bR * rm * (1+n1+n2+n3);
      pts.push([cx+Math.cos(a)*r+cpx*r*0.3, cy+Math.sin(a)*r+cpy*r*0.3]);
    }
    ctx.beginPath();
    pts.forEach(([x,y],i) => i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
    ctx.closePath();
    ctx.strokeStyle = `rgba(6,13,13,${fi*(0.55-lw*0.06)})`;
    ctx.lineWidth = lw; ctx.stroke();
  });

  const uR = bR * 1.08, rot = t * 0.004 * 50;

  ctx.beginPath(); ctx.arc(cx,cy,uR*1.02,0,Math.PI*2);
  ctx.strokeStyle=`rgba(6,13,13,${fi*0.06})`; ctx.lineWidth=0.3; ctx.stroke();

  /* Triangle-web overlays removed entirely — they were straight-line
     (angular) shapes; only round/curved geometry remains per request. */

  /* "Molecule" pattern — connecting lines removed (angular); the
     small round dots at each point are kept since they're curved. */
  const mR=bR*0.52, mPts=[{x:cx,y:cy}];
  for (let i=0;i<6;i++) {
    const a=i*Math.PI/3+t*0.4;
    mPts.push({x:cx+Math.cos(a)*mR, y:cy+Math.sin(a)*mR});
    mPts.push({x:cx+Math.cos(a)*mR*1.73, y:cy+Math.sin(a)*mR*1.73});
  }
  mPts.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x,p.y,mR*0.5,0,Math.PI*2);
    ctx.strokeStyle=`rgba(6,13,13,${fi*0.038})`; ctx.stroke();
  });
}

/* ═══════════════════════════════════════
   HERMETIC ICONS
═══════════════════════════════════════ */
function drawHermeticIcon(x, y, r, type, alpha, hov) {
  ctx.save(); ctx.translate(x, y);
  const t = hermeticT;
  ctx.strokeStyle = `rgba(6,13,13,${alpha})`;
  ctx.lineWidth = hov ? 1.0 : 0.65;

  if (type === 'triquetra') {
    for (let i=0; i<3; i++) {
      ctx.save(); ctx.rotate(i*Math.PI*2/3+t*0.25);
      ctx.beginPath(); ctx.arc(r*0.38,0,r*0.56,-Math.PI*0.88,Math.PI*0.88);
      ctx.strokeStyle=`rgba(6,13,13,${alpha})`; ctx.stroke(); ctx.restore();
    }
    ctx.beginPath(); ctx.arc(0,0,r*0.26,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,r*0.88,0,Math.PI*2);
    ctx.strokeStyle=`rgba(6,13,13,${alpha*0.25})`; ctx.lineWidth=0.4; ctx.stroke();
  }

  else if (type === 'hexagonFormation') {
    const rot2 = t * 0.08;
    ctx.lineWidth = hov ? 0.75 : 0.5;
    for (let l=1; l<=5; l++) {
      const hr = r*(0.15*l);
      ctx.beginPath();
      for (let i=0; i<=6; i++) {
        const a=i*Math.PI/3+rot2+Math.PI/6;
        i===0 ? ctx.moveTo(Math.cos(a)*hr,Math.sin(a)*hr) : ctx.lineTo(Math.cos(a)*hr,Math.sin(a)*hr);
      }
      ctx.strokeStyle=`rgba(6,13,13,${alpha*(0.45+l*0.1)})`; ctx.stroke();
    }
    const outerR = r*0.75;
    for (let i=0; i<6; i++) {
      const a=i*Math.PI/3+rot2+Math.PI/6;
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(a)*outerR,Math.sin(a)*outerR);
      ctx.strokeStyle=`rgba(6,13,13,${alpha*0.3})`; ctx.lineWidth=(hov?0.75:0.5)*0.6; ctx.stroke();
    }
    const pts6=[];
    for (let i=0; i<6; i++) {
      const a=i*Math.PI/3+rot2+Math.PI/6;
      pts6.push([Math.cos(a)*outerR,Math.sin(a)*outerR]);
    }
    [[0,2,4],[1,3,5]].forEach(tri => {
      ctx.beginPath();
      tri.forEach((vi,i) => { const[px,py]=pts6[vi]; i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); });
      ctx.closePath();
      ctx.strokeStyle=`rgba(6,13,13,${alpha*0.35})`; ctx.lineWidth=(hov?0.75:0.5)*0.55; ctx.stroke();
    });
    ctx.beginPath(); ctx.arc(0,0,r*0.92,0,Math.PI*2);
    ctx.strokeStyle=`rgba(6,13,13,${alpha*0.2})`; ctx.lineWidth=0.3; ctx.stroke();
  }

  else if (type === 'spiralingTriangles') {
    const steps=7, baseR=r*0.14, rotStep=Math.PI/6, scaleStep=1.38;
    ctx.lineWidth = hov ? 0.75 : 0.5;
    for (let s=0; s<steps; s++) {
      const sr = baseR * Math.pow(scaleStep,s);
      if (sr > r*1.05) break;
      const rot2 = t*0.18*(s%2===0?1:-1)+s*rotStep;
      const flip = s%2===0 ? 0 : Math.PI/3;
      ctx.beginPath();
      for (let i=0; i<=3; i++) {
        const a=i*Math.PI*2/3+rot2+flip-Math.PI/2;
        i===0?ctx.moveTo(Math.cos(a)*sr,Math.sin(a)*sr):ctx.lineTo(Math.cos(a)*sr,Math.sin(a)*sr);
      }
      ctx.strokeStyle=`rgba(6,13,13,${alpha*(0.75-s/(steps-1)*0.35)})`; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(0,0,r*0.92,0,Math.PI*2);
    ctx.strokeStyle=`rgba(6,13,13,${alpha*0.18})`; ctx.lineWidth=0.3; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,r*0.05,0,Math.PI*2);
    ctx.strokeStyle=`rgba(6,13,13,${alpha*0.5})`; ctx.lineWidth=0.4; ctx.stroke();
  }

  else if (type === 'eyeOfGod') {
    ctx.beginPath(); ctx.moveTo(-r*0.72,0); ctx.quadraticCurveTo(0,-r*0.65,r*0.72,0);
    ctx.strokeStyle=`rgba(6,13,13,${alpha})`; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r*0.72,0); ctx.quadraticCurveTo(0,r*0.65,r*0.72,0); ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,r*0.18,0,Math.PI*2);
    ctx.strokeStyle=`rgba(6,13,13,${alpha*0.9})`; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,r*0.06,0,Math.PI*2);
    ctx.strokeStyle=`rgba(6,13,13,${alpha*0.6})`; ctx.stroke();
    for (let i=0; i<12; i++) {
      const a = i*Math.PI/6+t*0.12;
      const inner=r*0.22, outer=r*0.68+(i%3===0?r*0.12:0);
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*inner,Math.sin(a)*inner);
      ctx.lineTo(Math.cos(a)*outer,Math.sin(a)*outer);
      ctx.strokeStyle=`rgba(6,13,13,${alpha*(i%3===0?0.45:0.25)})`;
      ctx.lineWidth=i%3===0?0.7:0.4; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(0,0,r*0.88,0,Math.PI*2);
    ctx.strokeStyle=`rgba(6,13,13,${alpha*0.18})`; ctx.lineWidth=0.35; ctx.stroke();
  }

  if (hov) {
    ctx.beginPath(); ctx.arc(0,0,r+8,0,Math.PI*2);
    ctx.strokeStyle='rgba(6,13,13,0.15)'; ctx.lineWidth=0.5;
    ctx.setLineDash([2,5]); ctx.stroke(); ctx.setLineDash([]);
  }
  ctx.restore();
}

/* ═══════════════════════════════════════
   ICON NODES
═══════════════════════════════════════ */
function drawIconNodes() {
  const cw = CW(), ch = CH();
  iconNodes.forEach((n, i) => {
    n.ang += 0.00035;
    n.x = n.cx + Math.cos(n.ang) * n.dist;
    n.y = n.cy + Math.sin(n.ang) * n.dist;
    const hov = Math.hypot(mx-n.x, my-n.y) < n.r + 6;
    if (hov) hoveredNode = n;

    ctx.beginPath(); ctx.moveTo(n.cx,n.cy); ctx.lineTo(n.x,n.y);
    ctx.strokeStyle=`rgba(6,13,13,${hov?0.45:0.1})`;
    ctx.lineWidth=hov?0.85:0.35;
    ctx.setLineDash([4,7]); ctx.stroke(); ctx.setLineDash([]);

    if (hov) {
      ctx.font="8px 'Pretendard',sans-serif";
      ctx.fillStyle='rgba(6,13,13,0.55)';
      const ta = n.x < cw/2 ? 'right' : 'left';
      ctx.textAlign = ta;
      const lx = n.x + (n.x < cw/2 ? -n.r-14 : n.r+14);
      ctx.fillText(n.title, lx, n.y-5);
      ctx.fillStyle='rgba(6,13,13,0.3)';
      ctx.fillText(n.type+' · '+n.year, lx, n.y+8);
      ctx.textAlign='left';
    }

    const prog = phase===2 ? Math.min(1,phaseT/PHASE_DUR[2])*0.9 : phase>=3 ? 0.9 : 0;
    if (prog > 0.01) drawHermeticIcon(n.x, n.y, n.r, n.icon, prog, hov);

    ctx.font="7px 'Pretendard',sans-serif";
    ctx.fillStyle=`rgba(6,13,13,${prog*0.55})`;
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(i+1, n.x, n.y+n.r+5);
    ctx.textBaseline='alphabetic'; ctx.textAlign='left';
  });
}

/* ═══════════════════════════════════════
   CROSSHAIRS
═══════════════════════════════════════ */
function drawCrosshairs() {
  const cw=CW(), ch=CH();
  ctx.strokeStyle='rgba(6,13,13,0.07)'; ctx.lineWidth=0.5;
  for (let r=0;r<5;r++) for (let c=0;c<7;c++) {
    const x=(c+0.5)*cw/7, y=(r+0.5)*ch/5, s=5;
    ctx.beginPath(); ctx.moveTo(x-s,y); ctx.lineTo(x+s,y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,y-s); ctx.lineTo(x,y+s); ctx.stroke();
  }
}

/* ═══════════════════════════════════════
   RENDER LOOP
═══════════════════════════════════════ */
function render() {
  const cw=CW(), ch=CH();
  ctx.clearRect(0,0,cw,ch);
  ctx.fillStyle='#F5F5F5'; ctx.fillRect(0,0,cw,ch);
  frame++; phaseT++;
  if (phaseT >= PHASE_DUR[phase] && phase < 3) {
    phase++; phaseT=0;
    if (phase===3) showUI();
  }
  document.getElementById('phase-label').style.opacity='0';
  drawCrosshairs();
  if (phase>=3) drawHermeticLines();
  if (phase>=2) { hoveredNode=null; drawIconNodes(); }
}

/* ═══════════════════════════════════════
   HUD + SCRAMBLE
═══════════════════════════════════════ */
const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%·—!?';
function rnd(n) { return Math.floor(Math.random()*n); }
function randStr(len) { let s=''; for(let i=0;i<len;i++) s+=CHARS[rnd(CHARS.length)]; return s; }
function tzString() {
  const off = -new Date().getTimezoneOffset();
  const sign = off >= 0 ? '+' : '-';
  const h = String(Math.floor(Math.abs(off)/60)).padStart(2,'0');
  const m = String(Math.abs(off)%60).padStart(2,'0');
  return `UTC${sign}${h}:${m}`;
}
let hudReady = false;

function nearestNodeInfo() {
  let best = null, bestDist = Infinity;
  iconNodes.forEach(n => {
    const d = Math.hypot(mx-n.x, my-n.y);
    if (d < bestDist) { bestDist = d; best = n; }
  });
  if (!best) return 'SIGNAL — n/a';
  /* Proximity falls off with distance from the node — reads like a
     live tracking/signal-strength readout instead of a static count. */
  const maxRange = Math.min(CW(), CH()) * 0.6;
  const pct = Math.max(0, Math.min(100, (1 - bestDist/maxRange) * 100));
  return `NEAREST — ${best.title}\nSIGNAL — ${pct.toFixed(1)}%`;
}

function updateHUD() {
  if (!hudReady) return;
  const hov = hoveredNode;
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('hudTop').textContent =
`TIME — ${timeStr}  ${tzString()}
VIEWPORT — ${window.innerWidth}×${window.innerHeight}
${nearestNodeInfo()}
─ ─ ○ ─
X — ${mx.toFixed(0)}   Y — ${my.toFixed(0)}
${hov ? '\n[ACTIVE]\n'+hov.title+'\n'+hov.type+'\n'+hov.year : ''}`;
  document.getElementById('hudBot').textContent =
`${randStr(5)}──${randStr(4)}
REFLECTIONS & FEEDBACK
${randStr(3)}──${randStr(6)}──
─ POND · MEDIA ARTIST ─`;
}

function scrambleReveal(el, target, delay, duration) {
  const chars=target.split(''), revealed=chars.map(()=>false);
  let done=false;
  const start=Date.now()+delay, end=start+duration;
  function tick() {
    if(done) return;
    const now=Date.now();
    if(now<start) { requestAnimationFrame(tick); return; }
    const prog=Math.min(1,(now-start)/(end-start));
    const rc=Math.floor(prog*chars.length);
    for(let i=0;i<rc;i++) revealed[i]=true;
    let str='';
    chars.forEach((ch,i) => {
      if(' ·—'.includes(ch)) { str+=ch; return; }
      str += revealed[i] ? ch : CHARS[rnd(CHARS.length)];
    });
    el.textContent=str;
    if(now>=end) { el.textContent=target; done=true; return; }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/* ═══════════════════════════════════════
   SHOW UI — called when phase reaches 3
═══════════════════════════════════════ */
function showUI() {
  /* Fade in the centered artwork image */
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      document.getElementById('center-video-img').style.opacity = '1';
    });
  });

  const t = document.getElementById('scramble-title');
  t.style.opacity='1'; scrambleReveal(t,'Pond',200,1100);

  const s = document.getElementById('title-sub');
  s.style.opacity='1'; s.textContent=randStr(26);
  scrambleReveal(s,'Reflections & Feedback · Seoul',900,800);

  [['nv1','Works'],['nv2','Statement'],['nv3','About'],['nv4','Contact']].forEach(([id,tx],i) => {
    const el=document.getElementById(id);
    el.style.opacity='1'; scrambleReveal(el,tx,500+i*130,500);
  });

  setTimeout(() => {
    document.getElementById('hudTop').style.opacity='1';
    document.getElementById('hudBot').style.opacity='1';
    hudReady=true;
  }, 1400);
}

/* ═══════════════════════════════════════
   CURSOR
═══════════════════════════════════════ */
const cur  = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let rx = window.innerWidth/2, ry = window.innerHeight/2;

function animRing() {
  rx += (mx-rx)*0.1; ry += (my-ry)*0.1;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(animRing);
}
animRing();

window.addEventListener('mousemove', e => {
  mx=e.clientX; my=e.clientY;
  cur.style.left=mx+'px'; cur.style.top=my+'px';
  const hn = iconNodes.find(n => Math.hypot(mx-n.x,my-n.y)<n.r+8);
  const info = document.getElementById('info');
  if (hn && phase>=2) {
    cur.style.width='4px'; cur.style.height='4px';
    info.style.display='block';
    info.style.left=(mx+16)+'px'; info.style.top=(my-6)+'px';
    info.textContent='NODE_0'+hn.id+'\n──────────\n'+hn.title+'\n'+hn.type+'\n'+hn.year;
  } else {
    cur.style.width='7px'; cur.style.height='7px';
    info.style.display='none';
  }
});

/* ═══════════════════════════════════════
   MAIN LOOP + RESIZE
═══════════════════════════════════════ */
function loop() { requestAnimationFrame(loop); render(); if(frame%4===0) updateHUD(); }

function resize() {
  canvas.width  = canvas.offsetWidth  * (window.devicePixelRatio||1);
  canvas.height = canvas.offsetHeight * (window.devicePixelRatio||1);
  ctx.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
  initScene();
}
window.addEventListener('resize', resize);
resize();

// Start at phase 3 — show everything immediately
phase=3; phaseT=0; showUI();
loop();
</script>
