<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:600px;background:#f0ede8;overflow:hidden;font-family:'Pretendard',sans-serif;cursor:crosshair;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;}

.hud{
  position:absolute;left:18px;top:18px;
  font-size:9.5px;line-height:1.65;
  color:#222;pointer-events:none;white-space:pre;
  letter-spacing:0.04em;
  font-family:'Pretendard',sans-serif;
  font-weight:300;
}
.hud-bot{top:auto;bottom:18px;}

#title-wrap{
  position:absolute;bottom:38px;right:28px;
  text-align:right;pointer-events:none;
}
#scramble-title{
  font-size:52px;font-weight:700;
  letter-spacing:-0.03em;color:#1a1a1a;line-height:1;
  font-family:'Pretendard',sans-serif;
}
#title-sub{
  font-size:9px;letter-spacing:0.18em;text-transform:uppercase;
  color:#666;margin-top:6px;
  font-family:'Pretendard',sans-serif;font-weight:300;
}

#dot{
  position:absolute;width:6px;height:6px;border-radius:50%;
  background:#333;pointer-events:none;transform:translate(-50%,-50%);display:none;
}

#info{
  position:absolute;background:rgba(240,237,232,0.92);border:0.5px solid #555;
  padding:8px 12px;font-size:9px;line-height:1.8;color:#222;
  pointer-events:none;max-width:160px;display:none;white-space:pre;
  font-family:'Pretendard',sans-serif;font-weight:300;
}

#nav{
  position:absolute;top:18px;right:18px;
  display:flex;flex-direction:column;gap:6px;align-items:flex-end;
}
#nav a{
  font-size:9px;letter-spacing:0.16em;text-transform:uppercase;
  color:#555;text-decoration:none;cursor:pointer;transition:color 0.2s;
  font-family:'Pretendard',sans-serif;font-weight:400;
}
#nav a:hover{color:#111;}

#scan{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:rgba(0,0,0,0.04);
  animation:scanMove 4s linear infinite;pointer-events:none;
}
@keyframes scanMove{0%{top:-2px;}100%{top:100%;}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="scan"></div>
<div id="dot"></div>
<div id="info"></div>

<div id="ui">
  <div class="hud" id="hudTop"></div>
  <div class="hud hud-bot" id="hudBot"></div>
  <div id="nav">
    <a onclick="sendPrompt('Works 섹션 보여줘')">Works</a>
    <a onclick="sendPrompt('Statement 섹션 보여줘')">Statement</a>
    <a onclick="sendPrompt('About 섹션 보여줘')">About</a>
    <a onclick="sendPrompt('Contact 섹션 보여줘')">Contact</a>
  </div>
  <div id="title-wrap">
    <div id="scramble-title">Pond</div>
    <div id="title-sub">Media Artist · Seoul · 2026</div>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=()=>canvas.offsetWidth;
const H=()=>canvas.offsetHeight;

function resize(){
  canvas.width=canvas.offsetWidth*devicePixelRatio;
  canvas.height=canvas.offsetHeight*devicePixelRatio;
  ctx.scale(devicePixelRatio,devicePixelRatio);
  initNodes();
}

let nodes=[],edges=[],dragging=null,mx=0,my=0,hoveredNode=null;

const HEADS=[
  {id:1,label:'1',cx:0.68,cy:0.14},
  {id:2,label:'2',cx:0.28,cy:0.38},
  {id:3,label:'3',cx:0.65,cy:0.55},
  {id:4,label:'4',cx:0.30,cy:0.78},
];
const META=[
  {id:1,title:'Threshold Studies',year:'2024',type:'Video Installation',data:'TIME-52095719\nANGLE-31946 %\nNODE_01'},
  {id:2,title:'Residual Memory',year:'2023',type:'Interactive',data:'TIME-52095719\nANGLE-31946 %\nNODE_02'},
  {id:3,title:'Frequency Mapping',year:'2023',type:'Generative A/V',data:'TIME-52095719\nANGLE-31946 %\nNODE_03'},
  {id:4,title:'Noise Portraits',year:'2022',type:'Single-ch Video',data:'TIME-52095719\nANGLE-31946 %\nNODE_04'},
];
const EDGE_COUNTS=[[1,2,18],[1,3,12],[2,3,14],[2,4,10],[3,4,8],[1,4,6]];

function initNodes(){
  const w=W(),h=H();
  nodes=HEADS.map((n,i)=>({
    ...n,x:n.cx*w,y:n.cy*h,r:52,vel:{x:0,y:0},
    phase:i*Math.PI*0.5,meta:META[i],
  }));
  edges=[];
  EDGE_COUNTS.forEach(([a,b,count])=>{
    const na=nodes.find(n=>n.id===a);
    const nb=nodes.find(n=>n.id===b);
    for(let i=0;i<count;i++) edges.push({na,nb,ta:Math.random(),tb:Math.random()});
  });
}

function drawHead(x,y,r,alpha,isHovered){
  ctx.save();ctx.translate(x,y);
  const rows=10,cols=14,pts=[];
  for(let i=0;i<=rows;i++){
    const phi=(i/rows)*Math.PI,row=[];
    for(let j=0;j<=cols;j++){
      const theta=(j/cols)*Math.PI*2;
      const hw=r*0.82,hh=r*1.18;
      let px=hw*Math.sin(phi)*Math.cos(theta);
      let py=-hh*Math.cos(phi);
      if(i<3) px*=0.7+0.3*(i/3);
      if(i>7){const t=(i-7)/3;px*=1-t*0.45;py+=t*8;}
      row.push([px,py]);
    }
    pts.push(row);
  }
  const col=isHovered?'rgba(40,40,60,':'rgba(30,30,30,';
  ctx.strokeStyle=col+(alpha*0.55)+')';ctx.lineWidth=0.5;
  for(let i=0;i<=rows;i++){
    ctx.beginPath();
    pts[i].forEach(([px,py],j)=>{j===0?ctx.moveTo(px,py):ctx.lineTo(px,py);});
    ctx.stroke();
  }
  for(let j=0;j<=cols;j++){
    ctx.beginPath();
    pts.forEach((row,i)=>{i===0?ctx.moveTo(row[j][0],row[j][1]):ctx.lineTo(row[j][0],row[j][1]);});
    ctx.stroke();
  }
  ctx.fillStyle=`rgba(18,18,18,${alpha*0.82})`;
  [[-r*0.27,-r*0.1],[r*0.27,-r*0.1]].forEach(([ex,ey])=>{
    ctx.beginPath();ctx.ellipse(ex,ey,r*0.16,r*0.1,0,0,Math.PI*2);ctx.fill();
  });
  ctx.beginPath();ctx.ellipse(0,r*0.12,r*0.07,r*0.09,0,0,Math.PI*2);
  ctx.fillStyle=`rgba(18,18,18,${alpha*0.5})`;ctx.fill();
  ctx.beginPath();ctx.ellipse(0,r*0.32,r*0.18,r*0.07,0,0,Math.PI*2);
  ctx.fillStyle=`rgba(18,18,18,${alpha*0.6})`;ctx.fill();
  if(isHovered){
    ctx.beginPath();ctx.arc(0,0,r+4,0,Math.PI*2);
    ctx.strokeStyle='rgba(40,40,60,0.35)';ctx.lineWidth=1;
    ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
  }
  ctx.restore();
}

function edgePoint(node,t){
  const angle=t*Math.PI*2;
  return{x:node.x+Math.cos(angle)*node.r*0.7,y:node.y+Math.sin(angle)*node.r*0.85};
}

function drawEdges(){
  edges.forEach(e=>{
    const a=edgePoint(e.na,e.ta),b=edgePoint(e.nb,e.tb);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
    const isActive=hoveredNode&&(e.na===hoveredNode||e.nb===hoveredNode);
    ctx.strokeStyle=isActive?'rgba(20,20,40,0.55)':'rgba(20,20,40,0.18)';
    ctx.lineWidth=isActive?0.8:0.45;ctx.stroke();
  });
  const shown=new Set();
  EDGE_COUNTS.forEach(([a,b,count])=>{
    const na=nodes.find(n=>n.id===a),nb=nodes.find(n=>n.id===b),key=`${a}-${b}`;
    if(!shown.has(key)){
      shown.add(key);
      const mx2=(na.x+nb.x)/2+8,my2=(na.y+nb.y)/2;
      ctx.font="9px 'Pretendard', sans-serif";
      ctx.fillStyle='rgba(80,80,80,0.7)';ctx.fillText(count,mx2,my2);
    }
  });
}

let frame=0;
const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&!?';
function rnd(n){return Math.floor(Math.random()*n);}
function randStr(len){let s='';for(let i=0;i<len;i++)s+=CHARS[rnd(CHARS.length)];return s;}

function updateHUD(){
  const t=Date.now();
  const hov=hoveredNode?hoveredNode.meta:null;
  document.getElementById('hudTop').textContent=
`TIME-${52000000+rnd(9999)}
ANGLE-${(31.946+Math.sin(t*0.001)*0.5).toFixed(3)} %
NODE COUNT — ${nodes.length}
EDGE COUNT — ${edges.length}
─ ─ ○ ─
CURSOR X — ${mx.toFixed(0)}
CURSOR Y — ${my.toFixed(0)}
${hov?`\n[ACTIVE NODE ${hov.id}]\n${hov.title}\n${hov.type}\n${hov.year}`:''}`;
  document.getElementById('hudBot').textContent=
`${randStr(4)}──${randStr(3)}──
I HATE IT WHEN
IM KITE ALIKE
${dragging?'[DRAGGING NODE '+dragging.id+']':'─ ─ IDLE ─ ─'}
SLILLY──SLUT
<NON DOLLARS>
I HAVE A NICE
BANK KARD── ?`;
}

// scramble
const TARGET='Pond';
const scEl=document.getElementById('scramble-title');
let revealed=[false,false,false,false],scrambleActive=true;
function scrambleTick(){
  if(!scrambleActive)return;
  let str='';
  TARGET.split('').forEach((ch,i)=>{str+=revealed[i]?ch:CHARS[rnd(CHARS.length)];});
  scEl.textContent=str;
}
let revIdx=0;
function revealNext(){
  if(revIdx>=TARGET.length){scrambleActive=false;scEl.textContent=TARGET;return;}
  revealed[revIdx++]=true;setTimeout(revealNext,420+rnd(200));
}
setTimeout(()=>{revealNext();},600);

function loop(){
  requestAnimationFrame(loop);
  const w=W(),h=H();
  ctx.clearRect(0,0,w,h);frame++;
  nodes.forEach(n=>{
    if(n===dragging)return;
    n.x+=Math.sin(frame*0.008+n.phase)*0.18;
    n.y+=Math.cos(frame*0.006+n.phase*1.3)*0.12;
    n.x=Math.max(n.r+10,Math.min(w-n.r-10,n.x));
    n.y=Math.max(n.r+10,Math.min(h-n.r-10,n.y));
  });
  drawEdges();
  nodes.forEach(n=>{
    const dist=Math.hypot(mx-n.x,my-n.y),hov=dist<n.r;
    drawHead(n.x,n.y,n.r,1,hov);
    ctx.save();
    ctx.beginPath();ctx.arc(n.x+n.r*0.72,n.y-n.r*0.72,11,0,Math.PI*2);
    ctx.strokeStyle='rgba(50,50,50,0.7)';ctx.lineWidth=0.7;
    ctx.fillStyle='rgba(240,237,232,0.85)';ctx.fill();ctx.stroke();
    ctx.font="9px 'Pretendard', sans-serif";
    ctx.fillStyle='#222';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(n.label,n.x+n.r*0.72,n.y-n.r*0.72);
    ctx.restore();
  });
  if(frame%4===0)updateHUD();
  if(frame%3===0&&scrambleActive)scrambleTick();
  hoveredNode=nodes.find(n=>Math.hypot(mx-n.x,my-n.y)<n.r)||null;
}

function getPos(e){
  const r=canvas.getBoundingClientRect(),cl=e.touches?e.touches[0]:e;
  return{x:cl.clientX-r.left,y:cl.clientY-r.top};
}
window.addEventListener('mousemove',e=>{
  const p=getPos(e);mx=p.x;my=p.y;
  const dot=document.getElementById('dot');
  dot.style.display='block';dot.style.left=mx+'px';dot.style.top=my+'px';
  if(dragging){dragging.x=mx;dragging.y=my;}
  const hn=nodes.find(n=>Math.hypot(mx-n.x,my-n.y)<n.r);
  const info=document.getElementById('info');
  if(hn){
    info.style.display='block';info.style.left=(mx+14)+'px';info.style.top=(my-10)+'px';
    info.textContent=`${hn.meta.data}\n──────────\n${hn.meta.title}\n${hn.meta.type}\n${hn.meta.year}`;
  } else {info.style.display='none';}
});
window.addEventListener('mousedown',e=>{const p=getPos(e);dragging=nodes.find(n=>Math.hypot(p.x-n.x,p.y-n.y)<n.r)||null;});
window.addEventListener('mouseup',()=>{dragging=null;});
window.addEventListener('touchstart',e=>{const p=getPos(e);mx=p.x;my=p.y;dragging=nodes.find(n=>Math.hypot(p.x-n.x,p.y-n.y)<n.r)||null;},{passive:true});
window.addEventListener('touchmove',e=>{const p=getPos(e);mx=p.x;my=p.y;if(dragging){dragging.x=mx;dragging.y=my;}},{passive:true});
window.addEventListener('touchend',()=>{dragging=null;});
window.addEventListener('resize',resize);
resize();loop();
</script>
</body>
</html>
